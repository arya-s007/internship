<!DOCTYPE html>
<html>
<head>
    <title>Change style</title>
</head>
<body>
<p id="para">Welcome to India</p>

<button
onclick="ChangeStyle()">Change
Style</button>

<script>
function ChangeStyle() {
    let p=document.getElementById("para");
    p.style.color="blue";
    p.style.fontSize="22px";
}
</script>

</body>
</html>
